<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title | default: "Flask Project Template" }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
</head>
<body>
  <div class="wrapper">
    <header>
      <h1><a href="{{ '/' | relative_url }}">Flask Project Template</a></h1>
      <p>A teaching-focused Flask starter with Jinja2, SQLite, and PicoCSS</p>

      <nav>
        <h3>Documentation</h3>
        <ul>
          <li><a href="{{ '/' | relative_url }}">Home</a></li>
          <li><a href="{{ '/guides/getting-started' | relative_url }}">Getting Started</a></li>
          <li><a href="{{ '/guides/project-structure' | relative_url }}">Project Structure</a></li>
          <li><a href="{{ '/guides/schema' | relative_url }}">Database Schema</a></li>
          <li><a href="{{ '/guides/exercises' | relative_url }}">Exercises</a></li>
          <li><a href="{{ '/guides/testing' | relative_url }}">Testing</a></li>
        </ul>

        <h3>Links</h3>
        <ul>
          <li><a href="https://github.com/{{ site.github.owner_name }}/{{ site.github.repository_name }}">View on GitHub</a></li>
        </ul>
      </nav>
    </header>

    <section>
      {{ content }}
    </section>

    <footer>
      <p><small>Digital Technologies @ Waimea College</small></p>
    </footer>
  </div>
</body>
</html>
